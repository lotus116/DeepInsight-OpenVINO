<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Microsoft YaHei', Arial, sans-serif;}
        .container { max-width: 1600px; margin: 0px auto; }
        .chart-row { display: flex; gap: 20px; margin: 20px 0; }
        .chart-box { flex: 1; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #1f77b4;">📊 Token 消耗对比与系统性能评估</h1>
        
        <div class="chart-row">
            <div class="chart-box" id="token-comparison"></div>
            <div class="chart-box" id="accuracy-by-level"></div>
        </div>
        
        <div class="chart-row">
            <div class="chart-box" id="accuracy-overall"></div>
            <div class="chart-box" id="response-time"></div>
        </div>
        
    </div>

    <script>
        // ==================== 1. Token 消耗对比柱状图 ====================
        const tokenData = [{
            x: ['G1  全量Schema', 'G2  RAG检索', 'G3  +错误感知重试'],
            y: [20338, 2425, 3033],
            type: 'bar',
            marker: {
                color: ['#ff6b6b', '#4ecdc4', '#45b7d1'],
                line: { color: '#333', width: 2 }
            },
            text: ['20,338', '2,425  (-88.1%)', '3,033  (-85.1%)'],
            textposition: 'outside',
            textfont: { size: 20, color: '#333' },
            hovertemplate: '<b>%{x}</b><br>Token: %{y:,}<extra></extra>'
        }];
        
        const tokenLayout = {
            title: '<b>Token 消耗对比</b><br><sub>单次查询的平均 Token 消耗</sub>',
            // 把title变大一些
            titlefont: { size: 24, color: '#333' },
            // 把yaxis的title变大一些
            yaxis: { title: 'Token 数量', gridcolor: '#e0e0e0',tickfont: { size: 18 }, titlefont: { size: 24 } },
            xaxis: { tickfont: { size: 20 } },
            plot_bgcolor: '#f8f9fa',
            paper_bgcolor: 'white',
            height: 666,
            margin: { b: 80, t: 80, l: 60, r: 40 }
        };
        
        Plotly.newPlot('token-comparison', tokenData, tokenLayout, {responsive: true});
        
        // ==================== 2. 按难度等级的准确率对比 ====================
        const accuracyByLevel = {
            data: [
                {
                    x: ['Easy', 'Medium', 'Hard', 'Extra-Hard'],
                    y: [100.0, 69.7, 50.0, 25.0],
                    name: 'G1 全量Schema',
                    type: 'bar',
                    marker: { color: '#ff6b6b' }
                },
                {
                    x: ['Easy', 'Medium', 'Hard', 'Extra-Hard'],
                    y: [100.0, 74.2, 54.8, 25.0],
                    name: 'G2 RAG检索',
                    type: 'bar',
                    marker: { color: '#4ecdc4' }
                },
                {
                    x: ['Easy', 'Medium', 'Hard', 'Extra-Hard'],
                    y: [100.0, 77.3, 57.1, 25.0],
                    name: 'G3 +错误感知重试',
                    type: 'bar',
                    marker: { color: '#45b7d1' }
                }
            ],
            layout: {
                title: '<b>按难度等级分类的准确率</b><br><sub>EX 指标 (执行准确率)</sub>',
                yaxis: { 
                    title: '准确率 (%)',
                    range: [0, 105],
                    gridcolor: '#e0e0e0'
                },
                xaxis: { title: '查询难度等级' },
                barmode: 'group',
                plot_bgcolor: '#f8f9fa',
                paper_bgcolor: 'white',
                height: 450,
                legend: { x: 1.05, y: 1 },
                hovermode: 'x unified'
            }
        };
        
        Plotly.newPlot('accuracy-by-level', accuracyByLevel.data, accuracyByLevel.layout, {responsive: true});
        
        // ==================== 3. 整体准确率对比 ====================
        const overallAccuracy = [{
            x: ['G1  全量Schema', 'G2  RAG检索', 'G3  +错误感知重试'],
            y: [66.7, 70.0, 72.0],
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: '#1f77b4', width: 4 },
            marker: { size: 16, color: ['#ff6b6b', '#4ecdc4', '#45b7d1'] },
            fill: 'tozeroy',
            fillcolor: 'rgba(31, 119, 180, 0.2)',
            text: ['66.7%', '70.0%  (+3.3%)', '72.0%  (+2.0%)'],
            textposition: 'top center',
            textfont: { size: 13, color: '#333' },
            hovertemplate: '<b>%{x}</b><br>准确率: %{y:.1f}%<extra></extra>'
        }];
        
        const overallLayout = {
            title: '<b>系统整体准确率演进</b><br><sub>跨越 72% 商业可用门槛</sub>',
            yaxis: { 
                title: '准确率 (%)',
                range: [60, 75],
                gridcolor: '#e0e0e0'
            },
            xaxis: { tickfont: { size: 12 } },
            plot_bgcolor: '#f8f9fa',
            paper_bgcolor: 'white',
            height: 450,
            margin: { b: 80, t: 80, l: 60, r: 40 },
            showlegend: false
        };
        
        Plotly.newPlot('accuracy-overall', overallAccuracy, overallLayout, {responsive: true});
        

        // ==================== 5. 响应时间对比 ====================
        const responseTime = [{
            x: ['G1', 'G2', 'G3'],
            y: [4.5, 3.5, 4.0],
            type: 'bar',
            marker: { color: '#ffa500' },
            name: '平均响应时间',
            hovertemplate: '%{x}<br>响应时间: %{y:.1f}s<extra></extra>'
        }, {
            x: ['G1', 'G2', 'G3'],
            y: [9.0, 6.5, 8.0],
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: '#ff6b6b', width: 3, dash: 'dash' },
            marker: { size: 10 },
            name: 'P95延迟',
            hovertemplate: '%{x}<br>P95延迟: %{y:.1f}s<extra></extra>'
        }];
        
        const responseTimeLayout = {
            title: '<b>响应时间对比</b><br><sub>包括平均和 P95 分位数</sub>',
            yaxis: { title: '时间 (秒)', gridcolor: '#e0e0e0' },
            plot_bgcolor: '#f8f9fa',
            paper_bgcolor: 'white',
            height: 450,
            hovermode: 'x unified',
            legend: { x: 1.05, y: 1 }
        };
        
        Plotly.newPlot('response-time', responseTime, responseTimeLayout, {responsive: true});
        
    </script>
</body>
</html>
